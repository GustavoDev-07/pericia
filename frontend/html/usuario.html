<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <!-- Reaproveita o mesmo CSS já usado em contato.html/inicio.html para a barra de cima
         ficar com a mesma cara, sem escrever nenhuma regra de CSS nova. -->
    <link rel="stylesheet" href="../css/contato.css">
    <link rel="stylesheet" href="../css/usuario.css">
    <title>Minha Conta – Perícia Fiducia</title>
</head>
<body>

    <!-- ── HEADER / NAV (mesmo padrão de contato.html / inicio.html) ── -->
    <header class="site-header">
        <div class="header-inner">
            <div class="left-panel">
                <div class="brand">
                    <img src="../ico/logo.png" alt="Logo Perícia Fiducia" class="logo">
                    <div class="brand-text">
                        <span class="brand-name">Perícia Fiducia</span>
                        <span class="brand-sub">Digital Forensics</span>
                    </div>
                </div>
            </div>

            <nav class="main-nav">
                <a href="inicio.html" class="nav-link" id="nav-inicio">Início</a>
                <a href="servicos.html" class="nav-link" id="nav-servicos">Serviços</a>
                <a href="contato.html" class="nav-link" id="nav-contato">Contato</a>
                <a href="usuario.html" class="nav-link nav-link--active" id="nav-minha-conta">Minha Conta</a>

                <!-- Área do usuário logado: avatar + nome + sair -->
                <div id="area-usuario-logado">
                    <span id="header-avatar-iniciais"></span>
                    <span id="header-nome-usuario"></span>
                    <button type="button" id="btn-sair-header">Sair</button>
                </div>
            </nav>
        </div>
    </header>

    <!-- ── MAIN ─────────────────────────────────────────── -->
    <main class="page-main">

        <section class="hero-section">
            <h1 class="hero-title">Minha Conta</h1>
        </section>

        <!-- Mensagem de status geral (erros, avisos, sucesso) -->
        <p id="mensagem-status"></p>

        <!-- ===================== SEÇÃO: PERFIL DO USUÁRIO ===================== -->
        <section id="secao-perfil">
            <h2>Meu Perfil</h2>

            <div id="perfil-avatar-wrapper">
                <img id="perfil-foto-img" src="" alt="Foto de perfil" style="display:none;">
                <span id="perfil-avatar-iniciais"></span>
            </div>

            <div id="perfil-dados">
                <p><strong>Nome:</strong> <span id="perfil-nome"></span></p>
                <p><strong>Email:</strong> <span id="perfil-email"></span></p>
            </div>

            <div id="perfil-acoes">
                <label for="input-foto-perfil" id="label-mudar-foto">
                    Mudar foto de perfil
                    <input type="file" id="input-foto-perfil" name="foto" accept="image/*" hidden>
                </label>

                <button type="button" id="btn-excluir-conta">Excluir Conta</button>
            </div>
        </section>

        <!-- ===================== SEÇÃO: MEUS PEDIDOS / DISPOSITIVOS ===================== -->
        <section id="secao-pedidos">
            <div id="cabecalho-pedidos">
                <h2>Meus Pedidos de Perícia</h2>
                <button id="btn-abrir-novo-pedido" type="button">+ Adicionar Dispositivo</button>
            </div>

            <p id="lista-pedidos-vazia" style="display:none;">Você ainda não fez nenhum pedido.</p>
            <div id="lista-pedidos-itens"></div>
        </section>

    </main>

    <!-- ===================== MODAL: NOVO PEDIDO / NOVO DISPOSITIVO ===================== -->
    <div id="modal-novo-pedido" style="display:none;">
        <div>
            <button type="button" id="btn-fechar-novo-pedido">Fechar</button>
            <h2>Adicionar Dispositivo</h2>

            <form id="form-novo-pedido">
                <div>
                    <label for="input-dispositivo">Dispositivo:</label><br>
                    <input type="text" id="input-dispositivo" name="dispositivo"
                           placeholder="Ex: Notebook Dell, HD externo, Celular Samsung..." required>
                </div>

                <div>
                    <label for="input-modelo-dispositivo">Modelo do dispositivo:</label><br>
                    <input type="text" id="input-modelo-dispositivo" name="modelo_dispositivo"
                           placeholder="Ex: Dell Inspiron 15, iPhone 12, WD Elements 1TB..." required>
                </div>

                <div>
                    <label for="input-o-que-fazer">O que precisa ser feito no dispositivo:</label><br>
                    <textarea id="input-o-que-fazer" name="o_que_fazer"
                              placeholder="Ex: Recuperação de dados, extração de mensagens, laudo de dano físico..."
                              required></textarea>
                </div>

                <div>
                    <label for="input-prazo">Em quanto tempo a perícia deve ser concluída:</label><br>
                    <input type="text" id="input-prazo" name="prazo"
                           placeholder="Ex: 5 dias úteis, 15/08/2026, urgente..." required>
                </div>

                <div>
                    <label for="input-estado-dispositivo">Estado atual do dispositivo:</label><br>
                    <select id="input-estado-dispositivo" name="estado_dispositivo" required>
                        <option value="">Selecione...</option>
                        <option value="Funcionando normalmente">Funcionando normalmente</option>
                        <option value="Queimado">Queimado</option>
                        <option value="Danificado fisicamente">Danificado fisicamente</option>
                        <option value="Molhado / Oxidado">Molhado / Oxidado</option>
                        <option value="Não liga">Não liga</option>
                        <option value="Tela quebrada">Tela quebrada</option>
                        <option value="Outro">Outro</option>
                    </select>
                </div>

                <p id="erro-form-pedido" style="display:none;"></p>

                <button type="submit">Enviar Pedido</button>
            </form>
        </div>
    </div>

    <!-- ===================== MODAL: LAUDO TÉCNICO ===================== -->
    <div id="modal-laudo" style="display:none;">
        <div>
            <button type="button" id="btn-fechar-laudo">Fechar</button>
            <h2>Laudo Técnico</h2>
            <div id="conteudo-laudo"></div>
        </div>
    </div>

    <!-- Template (não visível) de um card de pedido, usado pelo JS -->
    <template id="template-pedido">
        <article class="pedido-item">

            <div class="pedido-cabecalho">
                <h3 class="pedido-dispositivo"></h3>
                <button type="button" class="btn-excluir-pedido" title="Excluir dispositivo" aria-label="Excluir dispositivo">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
                        <path d="M10 11v6M14 11v6"></path>
                        <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path>
                    </svg>
                </button>
            </div>

            <p><strong>Modelo:</strong> <span class="pedido-modelo"></span></p>
            <p><strong>Serviço solicitado:</strong> <span class="pedido-o-que-fazer"></span></p>
            <p><strong>Prazo:</strong> <span class="pedido-prazo"></span></p>
            <p><strong>Estado do dispositivo:</strong> <span class="pedido-estado"></span></p>

            <div class="pedido-progresso">
                <p class="pedido-status-texto"></p>
                <div class="barra-progresso-fundo">
                    <div class="barra-progresso-preenchimento"></div>
                </div>
            </div>

            <div class="pedido-acoes">
                <button type="button" class="btn-ver-laudo" style="display:none;">Ver Laudo Técnico</button>
            </div>
        </article>
    </template>

    <script src="../js/usuario.js"></script>
</body>
</html>
