<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="../css/cadastro.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="../js/tema.js"></script>
    <script src="../js/pericia.js"></script>
    
    <title>Perícia Fiducia – Cadastro</title>
</head> 
<body class="escuro">
 
    <div class="container">
 
        <!-- LADO ESQUERDO (igual login) -->
        <div class="left-panel">
            <div class="brand">
                <a href="../html/inicio.html" class="btn-voltar">
        <img src="../ico/botao-voltar.png" alt="Voltar">
    </a>
                <img src="../ico/logo.png" alt="Logo Perícia Fiducia" class="logo">
                <div class="brand-text">
                    <span class="brand-name">Perícia Fiducia</span>
                    <span class="brand-sub">Digital Forensics</span>
                </div>
                <button class="btn-tema" data-tema-toggle title="Alternar tema" aria-label="Alternar tema">
                    <svg class="tema-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"></circle>
                        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
                    </svg>
                </button>
            </div>
 
            <div class="left-content">
                <h1 class="tagline">CRIE SUA CONTA E<br>COMECE SUA<br>JORNADA<br>DIGITAL!</h1>
                <p class="tagline-sub">Cadastro rápido, simples e seguro.</p>
            </div>
        </div>
 
        <!-- LADO DIREITO -->
        <div class="right-panel">

            <form class="form-card">

            <form class="form_card" id="form_card">
                <h2 class="form-title">CADASTRO</h2>
 
                <div class="field-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" placeholder="Digite seu nome">
                </div>
 
                <div class="field-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Digite seu e-mail">
                </div>

                <div class="field-group">
                    <label for="data">Data de nascimento</label>
                    <input type="date" id="data">
                </div>

                <div class="field-group">
                    <label for="cpf">CPF/CNPJ</label>
                    <input type="text" id="cpf" placeholder="Digite seu CPF ou CNPJ">
                </div>
 
                <div class="field-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="Digite sua senha">
                </div>

                <div class="field-group">
                    <label for="confirmar">Confirmar senha</label>
                    <input type="password" id="confirmar" placeholder="Confirme sua senha">
                </div>
                    
                <button type="submit" class="btn-login" id="registrar">REGISTRAR</button>
 
                <p class="signup-text">
                    Já possui uma conta? 
                    <a href="../html/login.html" class="link-cadastro">Realize o login</a>
                </p>
            </form>
        </div>
 
    </div>
 
    <script src="../js/cadastro.js"></script>
</body>
</html>
